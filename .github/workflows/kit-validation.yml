name: Kit Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Health check + integrity tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run kit health check (doctor.py)
        run: python .agent/scripts/doctor.py

      - name: Run kit integrity tests
        run: python -m pytest .agent/tests/test_kit_integrity.py -v
